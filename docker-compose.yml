services:
  postgres:
    container_name: raizes-nordeste-db
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - raizes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raizes_user} -d ${POSTGRES_DB:-raizes_nordeste}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  raizes_pg_data:
